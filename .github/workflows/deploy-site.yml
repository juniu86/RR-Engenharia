name: 🌐 Deploy site estático (public_html) para GoDaddy

on:
  push:
    branches: [ main ]
    paths:
      - 'public_html/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 📤 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public_html/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-site.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.gitkeep
            **/proposta/**
            **/proposta.zip
