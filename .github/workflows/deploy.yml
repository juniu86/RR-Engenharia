name: 🚀 Deploy app React (client/) — DESATIVADO

# ATENÇÃO: o site publicado em rres.com.br é o estático em public_html/,
# enviado pelo workflow deploy-site.yml. Este workflow constrói o app React
# em client/ e o publicaria na MESMA raiz FTP, sobrescrevendo o site no ar.
# Por isso o gatilho automático foi removido — só roda manualmente, de
# propósito, via "Run workflow".

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: 📥 Install dependencies
        run: pnpm install
      
      - name: 🔨 Build project
        run: pnpm run build
      
      - name: 📤 Deploy to GoDaddy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/public/
          server-dir: ./
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
