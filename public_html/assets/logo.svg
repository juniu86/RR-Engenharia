<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- RR Symbol - rounded with subtle styling -->
  <g transform="translate(0,0)">
    <rect x="2" y="2" width="44" height="56" rx="12" fill="rgba(9,99,237,0.15)" stroke="#0963ed" stroke-width="1.5"/>
    <!-- Up arrow (white) -->
    <path d="M14 20 L24 10 L34 20" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="24" y1="10" x2="24" y2="40" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Down arrow (blue) -->
    <path d="M34 40 L24 50 L14 40" stroke="#0963ed" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="24" y1="50" x2="24" y2="20" stroke="#0963ed" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- RR Text -->
  <text x="58" y="32" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="28" fill="white" dominant-baseline="middle">RR</text>
  <text x="103" y="32" font-family="Montserrat, Arial, sans-serif" font-weight="500" font-size="28" fill="white" dominant-baseline="middle">Engenharia</text>
  <!-- Tagline -->
  <text x="58" y="52" font-family="Montserrat, Arial, sans-serif" font-weight="400" font-size="8" fill="rgba(255,255,255,0.6)" letter-spacing="2">SUA PARCEIRA EM OBRAS E INSTALAÇÕES</text>
</svg>
